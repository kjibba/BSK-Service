<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sett passord – BSK Service</title>
  <style>
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,"Noto Sans","Apple Color Emoji","Segoe UI Emoji"}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;background:#0b1e2b}
    .card{background:#fff;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,.2);padding:24px;max-width:380px;width:92%}
    h1{margin:0 0 6px 0;font-size:20px}
    p{margin:0 0 16px 0;color:#444}
    label{display:block;font-size:13px;color:#333;margin:12px 0 6px}
    input{width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid #ccc;border-radius:8px;font-size:14px}
    button{width:100%;margin-top:16px;padding:10px 12px;font-size:15px;border:0;border-radius:8px;background:#0d6efd;color:#fff;cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    .err{color:#a00;margin-top:10px;min-height:1.2em}
    .foot{font-size:12px;color:#666;margin-top:14px;text-align:center}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Sett passord</h1>
      <p>Du må sette et passord for å fullføre første innlogging.</p>
      <form id="f">
        <label for="p1">Nytt passord</label>
        <input id="p1" name="p1" type="password" autocomplete="new-password" required />
        <label for="p2">Gjenta passord</label>
        <input id="p2" name="p2" type="password" autocomplete="new-password" required />
        <button id="btn" type="submit">Lagre passord</button>
        <div id="err" class="err"></div>
      </form>
      <div class="foot"><a href="/login.html">Tilbake til innlogging</a></div>
    </div>
  </div>
<script>
(async function(){
  // Forsøk å finne e-post i query (login-siden kan sende ?email=...)
  const usp = new URLSearchParams(location.search);
  let email = usp.get('email');

  const f = document.getElementById('f');
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  f.addEventListener('submit', async function(e){
    e.preventDefault(); err.textContent=''; btn.disabled = true;
    const p1 = document.getElementById('p1').value;
    const p2 = document.getElementById('p2').value;
    if (p1.length < 8) { err.textContent = 'Passord må være minst 8 tegn'; btn.disabled=false; return; }
    if (p1 !== p2) { err.textContent = 'Passordene er ikke like'; btn.disabled=false; return; }
    try {
      const payload = email ? { email, password: p1 } : { password: p1 };
      const url = email ? '/api/auth/set_initial_password' : '/api/auth/set_password';
      const res = await fetch(url, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        let msg = 'Kunne ikke sette passord';
        try { const j = await res.json(); if (j && j.error) msg = j.error; } catch {}
        throw new Error(msg);
      }
      // Passord satt. Tilbake til appen.
      location.replace('/');
    } catch (e) {
      err.textContent = e.message || 'Kunne ikke sette passord';
      btn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
