server {
  listen 443 ssl http2;
  server_name bsk.kjibba.no;

  # Let's Encrypt certs are mounted from host via docker-compose
  ssl_certificate /etc/letsencrypt/live/bsk.kjibba.no/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/bsk.kjibba.no/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  root /usr/share/nginx/html;
  index index.html;

  # Require authenticated app session for all content via auth_request
  # This delegates to backend /api/auth/check which returns 204 when authenticated
  auth_request /_auth_check;
  error_page 401 = @login;
  error_page 403 = @login;

  location = /_auth_check {
    internal;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend:8000/api/auth/check;
  }

  # Allow auth endpoints and health without auth_request (needed to login)
  location ^~ /api/auth/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend:8000;
    auth_request off;
  }

  location = /health {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend:8000/health;
    auth_request off;
  }

  # Static assets from built SPA
  location /assets/ {
  try_files $uri $uri/ =404;
  }

  # API
  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend:8000;
  }

  # Uploaded/static files
  location /static/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend:8000;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Serve the standalone login page when unauthorized
  location @login {
    auth_request off;
    root /usr/share/nginx/html;
    try_files /login.html =401;
  }
}
