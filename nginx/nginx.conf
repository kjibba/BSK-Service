server {
  listen 80;
  server_name _ bsk.kjibba.no;

  # Keep ACME challenge on HTTP for cert issuance/renewal
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect everything else to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }

  # Optionally include SSL server block(s) if present (created after cert issuance)
}

include /etc/nginx/conf.d/*.ssl.conf;
