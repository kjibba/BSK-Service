server {
  listen 80;
  server_name _ bsk.kjibba.no;

  root /usr/share/nginx/html;
  index index.html;

  # Serve static assets directly
  location /assets/ {
    try_files $uri $uri/ =404;
  }

  # Health endpoint (proxy to backend /health)
  location = /health {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  proxy_pass http://backend:8000/health;
  }

  # Proxy API requests to the backend service
  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  proxy_pass http://backend:8000;
  }

  # Proxy uploaded/static files via backend's /static
  location /static/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  proxy_pass http://backend:8000;
  }

  # ACME challenge for Let's Encrypt
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # SPA fallback: send everything else to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

}

# HTTPS server for domain if certs are present
server {
  listen 443 ssl http2;
  server_name bsk.kjibba.no;

  ssl_certificate /etc/letsencrypt/live/bsk.kjibba.no/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/bsk.kjibba.no/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  root /usr/share/nginx/html;
  index index.html;

  location /assets/ { try_files $uri $uri/ =404; }

  location = /health { proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_pass http://backend:8000/health; }
  location /api/ { proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_pass http://backend:8000; }
  location /static/ { proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_pass http://backend:8000; }

  # SPA fallback
  location / { try_files $uri $uri/ /index.html; }
}
