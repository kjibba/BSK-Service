server {
  listen 80;
  server_name _ bsk.kjibba.no;

  root /usr/share/nginx/html;
  index index.html;

  # ACME challenge for cert issuance/renewal stays open
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    auth_request off;
  }

  # Protect all HTTP content behind app auth as well (for lokal kjøring)
  auth_request /_auth_check;
  error_page 401 = @login;
  error_page 403 = @login;

  location = /_auth_check {
    internal;
  # auth_request-subrequests skal ikke sende body
  proxy_pass_request_body off;
  proxy_set_header Content-Length "";

  # VIKTIG: Send videre klientens cookies slik at backend ser connect.sid
  proxy_set_header Cookie $http_cookie;

  # Behold nyttige headers for logging/sporing
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Original-URI $request_uri;

  # Timeouts for å unngå hengende auth-subrequests
  proxy_connect_timeout 2s;
  proxy_read_timeout 5s;
  proxy_send_timeout 5s;
    proxy_pass http://backend:8000/api/auth/check;
  }

  # Allow auth endpoints and health without auth_request (needed to login)
  location ^~ /api/auth/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend:8000;
    auth_request off;
  }

  # Allow client error logging without auth (so pre-login errors can be captured)
  location = /api/meta/client-log {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend:8000;
    auth_request off;
  }

  # Allow set-password page to be served without triggering auth (first-time users)
  location = /set-password.html {
    auth_request off;
    root /usr/share/nginx/html;
    try_files /set-password.html =404;
  }

  location = /health {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend:8000/health;
    auth_request off;
  }

  # Assets
  location /assets/ {
    try_files $uri $uri/ =404;
  }

  # API (guarded via backend, still behind auth_request here)
  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend:8000;
  }

  # Uploaded/static files via backend
  location /static/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend:8000;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Serve login page for unauthorized
  location @login {
    auth_request off;
    root /usr/share/nginx/html;
    try_files /login.html =401;
  }
}

# Include SSL server block(s) for produksjon
include /etc/nginx/conf.d/*.ssl.conf;
