server {
  listen 80;
  server_name _ bsk.kjibba.no;

  root /usr/share/nginx/html;
  index index.html;

  # Serve static assets directly
  location /assets/ {
    try_files $uri $uri/ =404;
  }

  # Health endpoint (proxy to backend /health)
  location = /health {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  proxy_pass http://backend:8000/health;
  }

  # Proxy API requests to the backend service
  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  proxy_pass http://backend:8000;
  }

  # Proxy uploaded/static files via backend's /static
  location /static/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  proxy_pass http://backend:8000;
  }

  # ACME challenge for Let's Encrypt
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # SPA fallback: send everything else to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

# Optionally include SSL server block(s) if present (created after cert issuance)
}

include /etc/nginx/conf.d/*.ssl.conf;
