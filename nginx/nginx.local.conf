server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Require HTTP Basic auth for all requests to ensure no unauthenticated user
  # can fetch static files or reach the API. Credentials are created at
  # container start by the entrypoint script (from env vars).
  auth_basic "Restricted";
  auth_basic_user_file /etc/nginx/.htpasswd;

  # Re-resolve Docker service names instead of caching IP at startup
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $backend_upstream http://backend:8000;

  # Static assets from built SPA
  location /assets/ {
    try_files $uri $uri/ =404;
  }

  # Health proxy to backend
  location = /health {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  proxy_pass $backend_upstream/health;
  }

  # API proxy
  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  proxy_pass $backend_upstream;
  }

  # Uploaded/static files via backend
  location /static/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  proxy_pass $backend_upstream;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
